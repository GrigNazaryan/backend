version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yerevan
      POSTGRES_PASSWORD: yerevan
      POSTGRES_DB: yerevan_services
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yerevan"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://yerevan:yerevan@db:5432/yerevan_services
      JWT_SECRET: dev-secret-change-in-production
      SMS_PROVIDER: console
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"

volumes:
  pgdata:
